// Helper: build legend table
function buildTable(containerId, data) {
    let html = '<table class="legend-table">';
    data.forEach((d,i) => {
        const color = d.itemStyle ? d.itemStyle.color : '#666';
        html += '<tr data-idx="'+i+'"><td><span class="swatch" style="background:'+color+'"></span></td><td>'+d.name+'</td><td style="text-align:right;color:#94a3b8">'+d.value+'%</td></tr>';
    });
    html += '</table>';
    document.getElementById(containerId).innerHTML = html;
    return document.getElementById(containerId).querySelectorAll('tr');
}

// Helper: create interactive donut
function createDonut(chartId, tableRows, data, title) {
    const chart = echarts.init(document.getElementById(chartId));
    const detailCard = document.getElementById('detail_card');
    let currentIdx = -1;
    
    const option = {
        tooltip: {show: false},
        legend: {show: false},
        series: [{
            type: 'pie',
            radius: ['45%', '72%'],
            center: ['50%', '48%'],
            avoidLabelOverlap: false,
            itemStyle: {borderColor: '#1e293b', borderWidth: 2},
            label: {
                show: true,
                position: 'outside',
                formatter: '{b}\n{c}%',
                color: '#94a3b8',
                fontSize: 10,
                lineHeight: 14,
                alignTo: 'labelLine',
                distanceToLabelLine: 4
            },
            labelLine: {
                length: 20,
                length2: 30,
                lineStyle: {color: '#475569', width: 1}
            },
            emphasis: {
                scale: true,
                scaleSize: 12,
                focus: 'self',
                label: {fontSize: 13, fontWeight: 'bold', color: '#f0f6fc'},
                labelLine: {lineStyle: {color: '#94a3b8', width: 2}}
            },
            data: data
        }]
    };
    
    chart.setOption(option);
    
    chart.on('mouseover', function(params) {
        if (params.componentType === 'series') {
            currentIdx = params.dataIndex;
            tableRows.forEach(tr => tr.classList.remove('highlight'));
            if (tableRows[currentIdx]) tableRows[currentIdx].classList.add('highlight');
        }
    });
    
    chart.on('mouseout', function() {
        tableRows.forEach(tr => tr.classList.remove('highlight'));
        currentIdx = -1;
    });
    
    chart.on('click', function(params) {
        if (params.componentType === 'series') {
            const pos = chart.convertToPixel({seriesIndex: 0}, [0,0]);
            const item = data[params.dataIndex];
            detailCard.innerHTML = '<div class="name">'+title+'</div><div style="font-size:18px;color:#58a6ff;font-weight:bold">'+item.name+'</div><div class="stat">概率: '+item.value+'%</div>';
            detailCard.style.display = 'block';
            detailCard.style.left = Math.min(pos[0]+20, window.innerWidth-180) + 'px';
            detailCard.style.top = Math.min(pos[1]+60, window.innerHeight-120) + 'px';
            setTimeout(function() {detailCard.style.display='none'}, 3000);
        }
    });
    
    // Table hover -> highlight chart sector
    tableRows.forEach((tr, i) => {
        tr.style.cursor = 'pointer';
        tr.addEventListener('mouseenter', function() {
            chart.dispatchAction({type: 'highlight', seriesIndex: 0, dataIndex: i});
            tableRows.forEach(r => r.classList.remove('highlight'));
            tr.classList.add('highlight');
        });
        tr.addEventListener('mouseleave', function() {
            chart.dispatchAction({type: 'downplay', seriesIndex: 0, dataIndex: i});
            tr.classList.remove('highlight');
        });
        tr.addEventListener('click', function() {
            chart.dispatchAction({type: 'highlight', seriesIndex: 0, dataIndex: i});
            const item = data[i];
            detailCard.innerHTML = '<div class="name">'+title+'</div><div style="font-size:18px;color:#58a6ff;font-weight:bold">'+item.name+'</div><div class="stat">概率: '+item.value+'%</div>';
            detailCard.style.display = 'block';
            const rect = tr.getBoundingClientRect();
            detailCard.style.left = Math.min(rect.right+10, window.innerWidth-180)+'px';
            detailCard.style.top = Math.min(rect.top, window.innerHeight-100)+'px';
            setTimeout(function() {chart.dispatchAction({type:'downplay',seriesIndex:0,dataIndex:i});detailCard.style.display='none'}, 3000);
        });
    });
    
    window.addEventListener('resize', () => chart.resize());
    return chart;
}
